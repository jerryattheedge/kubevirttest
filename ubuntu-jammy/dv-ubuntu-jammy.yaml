apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: ubuntu-noble-rootdisk
  namespace: vms
spec:
  source:
    http:
      # Ubuntu Server 24.04 LTS (Noble) cloud image
      url: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img"
  storage:
    resources:
      requests:
        storage: 10Gi
    accessModes:
      - ReadWriteOnce
    volumeMode: Filesystem
